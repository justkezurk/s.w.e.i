<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>S.W.E.I — Smart Web Evolving Intelligence</title>
<style>
  :root {
    --bg: #0a0a0f;
    --accent: #00ffcc;
    --text: #e0e0e0;
    --bubble-user: #1f2a2a;
    --bubble-swei: #112222;
  }
  body {
    background: #0a0a0f;
    color: #e0e0e0;
    font-family: system-ui, -apple-system, sans-serif;
    margin: 0;
    padding: 0;
    height: 100vh;
    display: flex;
    flex-direction: column;
  }
  .header {
    padding: 16px 24px;
    border-bottom: 1px solid #222;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .logo {
    font-size: 22px;
    font-weight: 700;
    color: #00ffcc;
    letter-spacing: -1px;
  }
  .chat-container {
    flex: 1;
    max-width: 860px;
    margin: 0 auto;
    width: 100%;
    display: flex;
    flex-direction: column;
    padding: 20px;
  }
  .messages {
    flex: 1;
    overflow-y: auto;
    padding: 10px 0;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .message {
    max-width: 75%;
    padding: 14px 18px;
    border-radius: 18px;
    line-height: 1.5;
    white-space: pre-wrap;
  }
  .user {
    background: var(--bubble-user);
    align-self: flex-end;
    border-bottom-right-radius: 6px;
  }
  .swei {
    background: var(--bubble-swei);
    border-left: 4px solid #00ffcc;
    align-self: flex-start;
    border-bottom-left-radius: 6px;
  }
  .input-area {
    padding: 16px 24px;
    border-top: 1px solid #222;
    background: #0a0a0f;
  }
  #input {
    width: 100%;
    padding: 14px 20px;
    border: 1px solid #333;
    border-radius: 999px;
    background: #111;
    color: white;
    font-size: 16px;
    outline: none;
  }
  #input:focus {
    border-color: #00ffcc;
  }
</style>
</head>
<body>
  <div class="header">
    <div class="logo">S.W.E.I</div>
    <div style="color:#666; font-size:13px;">Smart Web Evolving Intelligence</div>
  </div>

  <div class="chat-container">
    <div id="messages" class="messages"></div>
  </div>

  <div class="input-area">
    <input id="input" type="text" placeholder="Ask anything... (try math or general questions)" onkeydown="if(event.key==='Enter') sendMessage()">
  </div>

<script src="src/main.js"></script>
</body>
</html>
