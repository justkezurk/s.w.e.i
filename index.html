<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>S.W.E.I</title>
    <style>
        body {
            background: #0a0a0a;
            color: #e0e0e0;
            font-family: system-ui, -apple-system, sans-serif;
            margin: 0;
            padding: 20px;
        }
        .chat-container {
            max-width: 800px;
            margin: 0 auto;
            background: #111;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }
        .messages {
            height: 500px;
            overflow-y: auto;
            padding: 20px;
            background: #0a0a0a;
        }
        .message {
            margin-bottom: 16px;
            padding: 12px 16px;
            border-radius: 18px;
            max-width: 80%;
            line-height: 1.5;
        }
        .user {
            background: #1a73e8;
            color: white;
            margin-left: auto;
            border-bottom-right-radius: 4px;
        }
        .assistant {
            background: #2a2a2a;
            border-bottom-left-radius: 4px;
        }
        .input-area {
            display: flex;
            padding: 16px;
            background: #111;
            border-top: 1px solid #333;
        }
        input {
            flex: 1;
            padding: 12px 16px;
            border: none;
            border-radius: 24px;
            background: #1a1a1a;
            color: #e0e0e0;
            font-size: 15px;
            outline: none;
        }
        button {
            margin-left: 12px;
            padding: 0 24px;
            border: none;
            border-radius: 24px;
            background: #1a73e8;
            color: white;
            font-weight: 600;
            cursor: pointer;
        }
        .header {
            text-align: center;
            padding: 16px;
            background: #111;
            border-bottom: 1px solid #333;
        }
    </style>
</head>
<body>
    <div class="chat-container">
        <div class="header">
            <h2>S.W.E.I</h2>
            <p style="margin:0; opacity:0.7; font-size:0.9rem;">Smart Web Evolving Intelligence</p>
        </div>
        <div id="messages" class="messages"></div>
        <div class="input-area">
            <input type="text" id="userInput" placeholder="Message S.W.E.I..." onkeypress="if(event.key === 'Enter') sendMessage()">
            <button onclick="sendMessage()">Send</button>
        </div>
    </div>

    <script src="src/main.js"></script>

    <!-- Transformers.js for neural fallback -->
    <script src="https://cdn.jsdelivr.net/npm/@xenova/transformers@2.17.2"></script>
</body>
</html>
