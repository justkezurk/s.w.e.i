<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>S.W.E.I — Smart Web Evolving Intelligence</title>
<style>
  :root {
    --bg: #0a0a0f;
    --accent: #00ffcc;
    --text: #e0e0e0;
  }
  body {
    background: #0a0a0f;
    color: #e0e0e0;
    font-family: system-ui, sans-serif;
    margin: 0;
    padding: 20px;
    display: flex;
    flex-direction: column;
    height: 100vh;
  }
  .chat-container {
    flex: 1;
    max-width: 800px;
    margin: 0 auto;
    width: 100%;
    display: flex;
    flex-direction: column;
  }
  .messages {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
    border: 1px solid #222;
    border-radius: 12px;
    background: #111;
    margin-bottom: 16px;
  }
  .message {
    margin-bottom: 16px;
    padding: 12px 16px;
    border-radius: 12px;
    max-width: 80%;
  }
  .user { background: #222; align-self: flex-end; }
  .swei { background: #1a2a2a; border-left: 4px solid #00ffcc; }
  input {
    width: 100%;
    padding: 14px;
    border: 1px solid #333;
    border-radius: 999px;
    background: #111;
    color: white;
    font-size: 16px;
  }
</style>
</head>
<body>
  <div class="chat-container">
    <h1 style="text-align:center; color:#00ffcc; margin-bottom:20px;">S.W.E.I</h1>
    <div id="messages" class="messages"></div>
    <input id="input" type="text" placeholder="Ask S.W.E.I anything..." onkeydown="if(event.key==='Enter') sendMessage()">
  </div>

<script>
  const messagesDiv = document.getElementById('messages');
  const input = document.getElementById('input');

  function addMessage(text, isUser = false) {
    const div = document.createElement('div');
    div.className = `message ${isUser ? 'user' : 'swei'}`;
    div.textContent = text;
    messagesDiv.appendChild(div);
    messagesDiv.scrollTop = messagesDiv.scrollHeight;
  }

  async function sendMessage() {
    const text = input.value.trim();
    if (!text) return;
    addMessage(text, true);
    input.value = '';

    // Placeholder - will connect to parameter engine later
    setTimeout(() => {
      addMessage("[S.W.E.I] Thanks for the message. I'm currently in early development mode. More capabilities coming soon.");
    }, 600);
  }

  // Initial greeting
  addMessage("Hello! I'm S.W.E.I. Ask me anything — I'll ask clarifying questions when helpful.");
</script>
</body>
</html>
